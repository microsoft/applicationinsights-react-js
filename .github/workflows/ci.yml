# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ main, release3.x ]
  pull_request:
    branches: [ main, release3.x ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 18.x, 20.x ]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Update rush shrinkwrap dependencies (for different node versions)
      env:
        RUSH_TEMP_FOLDER: /tmp/rush-temp
        NPM_CONFIG_TMP: /tmp/rush-temp/npm-tmp
      run: |
        mkdir -p /tmp/rush-temp/npm-tmp
        node common/scripts/install-run-rush.js update --full --recheck
    - run: npm install rollup -g
    - run: npm install grunt-cli
    - run: npm install
    - run: node common/scripts/install-run-rush.js check
    - run: npm run build --verbose
      timeout-minutes: 10
    - run: npm run test --verbose
      timeout-minutes: 15
